---
- name: "Show summary"
  when: "not(teardown | bool)"
  block:
    - name: "Set summary"
      ansible.builtin.set_fact:
        "_summary": |
          ========== CLEURA CLOUD LAUNCH PAD ==========
                            .-
                      =@@@@@@@
                   =@@@@@@@@@@       +@@@@*.
                .#@@@@@@@@@@@@       +@@@@@@@@@@
                @@@@@@@@@@@@@@       *@@@@@@@@@@
              :@@@@@@@@@@@@@%+.      *@@@@@@@@@@
             .@@@@@@@@@@@            *@@@@@@@@@@
             @@@@@@@@@@              #@@@@@@@@@@
            -@@@@@@@@@                   .:%@@@@
            @@@@@@@@@+
            @@@@@@@@@:
            @@@@@@@@@#
            :@@@@@@@@@                .@@@-.
             @@@@@@@@@@:             .@@@@@@@@@@
             .@@@@@@@@@@@-.       .-@@@@@@@@@@@.
              .@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@@
                @@@@@@@@@@@@@@@@@@@@@@@@@@@@@
                 .@@@@@@@@@@@@@@@@@@@@@@@@@.
                   .@@@@@@@@@@@@@@@@@@@@@.
                       #@@@@@@@@@@@@@%
                               .

          Pad name: {{ pad_name }}

          Pad Ramp server UUID: {{ _ramp.server.id }}

          Pad Ramp IPv4 address: {{ _ramp_floating_ip.floating_ip.floating_ip_address }}
          Allows SSH from: {{ _security_group_rule_ssh_ipv4.rule.remote_ip_prefix }}

          {% if enable_ipv6 | bool %}Pad Ramp IPv6 address: {{ _ramp_port.port.fixed_ips[1].ip_address }}
          Allows SSH from: {{ _security_group_rule_ssh_ipv6.rule.remote_ip_prefix }}{% endif %}

          Network UUID: {{ _network.network.id }}
          Security group UUID: {{ _security_group.security_group.id }}

          To find out how to connect to your host, run this command:

          openstack server ssh {{ _ramp.server.id }} -- -l cleura

    - name: "Show summary"
      ansible.builtin.debug:
        msg: "{{ _summary.split('\n') }}"
